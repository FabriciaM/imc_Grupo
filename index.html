<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto-imc</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/script.js" defer></script>
    <script src="js/scripts_imc.js" type="module" defer></script>
</head>
<body>

    <h1 id="titulo">Calculadora de IMC</h1>
    <form class="formulario">
    <label for="nome">Nome:</label>
    <input type="text" id="nome" name="nome" required>
    <label for="peso">Peso (kg):</label>
    <input type="text" id="peso" name="peso" required>
    <label for="altura">Altura (m):</label>
    <input type="text" id="altura" name="altura" required>
    <label for="data">Data de Nascimento:</label>
    <input type="date" id="dataNascimento" name="dataNascimento" class="data" required>
    <label for="sexo">Sexo:</label>
    <input type="radio" id="masculino" name="sexo" value="masculino" required>
    <label for="masculino">Masculino</label>
    <input type="radio" id="feminino" name="sexo" value="feminino" required>
    <label for="feminino">Feminino</label>
    <button type="submit" id="btn-calcular">Calcular IMC</button>
    </form>

    <div id="resultado">  
    </div>

</body>
</html>
